<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Renta</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a href="index.html" class="brand">Renta<span class="dot">.</span></a>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="cars.html">Cars</a></li>
        <li><a href="about.html#locations">Locations</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline btn-sm" aria-current="page">Sign in</a>
      <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<section>
  <div class="container">
    <div class="text-center" style="margin-bottom:34px;">
      <span class="eyebrow">Welcome back</span>
      <h1 style="font-size:2.2rem;">Sign in to your account</h1>
      <p class="lede" style="margin-inline:auto;">Manage bookings, view receipts and rebook your favorite cars.</p>
    </div>

    <div class="form-shell">
      <form data-validate data-success-msg="Signed in! Redirecting to your dashboard…">
        <div class="form-msg"></div>

        <div class="form-group">
          <label for="login-email">Email address</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" placeholder="••••••••" required>
        </div>

        <div class="check-row">
          <input type="checkbox" id="remember-me" name="remember">
          <label for="remember-me">Keep me signed in on this device</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign in</button>

        <div class="divider-or">or sign in with</div>
        <div class="social-row">
          <button type="button" class="btn btn-outline">Google</button>
          <button type="button" class="btn btn-outline">Facebook</button>
        </div>

        <p class="text-center" style="margin-top:22px; font-size:.9rem; color:var(--ink-soft);">
          Don't have an account? <a href="register.html" style="color:var(--amber-dark); font-weight:700;">Create one</a>
        </p>
      </form>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2026 Renta Car Rentals. All rights reserved.</span>
      <span>Privacy · Terms · Support</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
